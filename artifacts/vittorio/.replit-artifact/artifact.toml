kind = "web"
previewPath = "/"
title = "Vittorio & Associados"
version = "1.0.0"
id = "artifacts/vittorio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21080

[services.development]
run = "pnpm --filter @workspace/vittorio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vittorio", "run", "build" ]
serve = "static"
publicDir = "artifacts/vittorio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21080"
BASE_PATH = "/"
